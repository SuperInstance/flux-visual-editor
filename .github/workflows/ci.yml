name: CI
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate HTML
        run: |
          if [ -f index.html ]; then
            echo "index.html exists"
            # Basic validation
            grep -q "<html" index.html
            grep -q "</html>" index.html
            echo "HTML structure OK"
          fi
